<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ScamShield</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>

  <!-- ── Header ── -->
  <header class="header">
    <div class="logo">
      <svg class="shield-icon" viewBox="0 0 24 24" fill="none">
        <path d="M12 2L3 6v5c0 5.25 3.75 10.15 9 11.35C17.25 21.15 21 16.25 21 11V6L12 2z"
              fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
        <path d="M9 12l2 2 4-4" stroke="currentColor" stroke-width="1.8"
              stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span class="logo-text">ScamShield</span>
    </div>
    <span class="ai-badge">AI</span>
  </header>

  <!-- ── URL Bar ── -->
  <div class="url-bar">
    <svg class="url-icon" viewBox="0 0 16 16" fill="currentColor">
      <path d="M4.5 11.5a3.5 3.5 0 0 0 5 0l1-1a.5.5 0 0 0-.707-.707l-1 1a2.5 2.5 0 0 1-3.536-3.536l1-1a.5.5 0 1 0-.708-.707l-1 1a3.5 3.5 0 0 0 0 4.95z"/>
      <path d="M10 4.5a.5.5 0 0 0 0 .707l1 1a2.5 2.5 0 0 1-3.536 3.536l-1-1a.5.5 0 0 0-.707.707l1 1A3.5 3.5 0 0 0 11.5 4.5l-1-1a.5.5 0 0 0-.5 0z"/>
    </svg>
    <span id="url-display" class="url-text">Detecting URL…</span>
  </div>

  <!-- ── Loading State ── -->
  <div id="state-loading" class="state active">
    <div class="spinner-ring"></div>
    <p class="loading-text">Analyzing with AI…</p>
    <p class="loading-sub">Scanning 15 security signals</p>
  </div>

  <!-- ── Result State ── -->
  <div id="state-result" class="state">

    <!-- Status Badge -->
    <div id="status-badge" class="status-badge">
      <span id="status-icon"></span>
      <span id="status-label">SAFE</span>
    </div>

    <!-- Score Ring -->
    <div class="score-wrap">
      <svg class="score-ring" viewBox="0 0 120 120">
        <circle class="ring-bg"   cx="60" cy="60" r="50"/>
        <circle id="ring-fill" class="ring-fill" cx="60" cy="60" r="50"/>
      </svg>
      <div class="score-inner">
        <span id="score-num" class="score-num">0</span>
        <span class="score-unit">/100</span>
      </div>
    </div>
    <p class="score-label-text">Credibility Score</p>

    <!-- Progress Bar -->
    <div class="prog-track">
      <div id="prog-bar" class="prog-bar"></div>
    </div>
    <p id="conf-text" class="conf-text"></p>

    <!-- Threat Signals -->
    <div id="signals" class="signals"></div>

    <!-- View Report Button -->
    <button id="btn-report" class="btn-report">
      View Detailed Report
      <svg viewBox="0 0 16 16" fill="currentColor" width="14">
        <path fill-rule="evenodd" d="M4.646 1.646a.5.5 0 0 1 .708 0l6 6a.5.5 0 0 1 0 .708l-6 6a.5.5 0 0 1-.708-.708L10.293 8 4.646 2.354a.5.5 0 0 1 0-.708z"/>
      </svg>
    </button>

  </div>

  <!-- ── Error State ── -->
  <div id="state-error" class="state">
    <div class="error-icon">⚠</div>
    <p class="error-title" id="error-title">Analysis Failed</p>
    <p class="error-msg"   id="error-msg">Could not connect to ScamShield backend.</p>
    <p class="error-hint">Make sure the backend is running on port 8000.</p>
    <button id="btn-retry" class="btn-retry">Retry</button>
  </div>

  <!-- ── Footer ── -->
  <footer class="footer">
    Powered by <strong>ScamShield AI</strong> · 99.75% accuracy
  </footer>

  <script src="popup.js"></script>
</body>
</html>
